  <rect x="60" y="50" width="100" height="76" rx="18" fill="#7C3AED"></rect>
  <polygon points="78,126 58,152 102,126" fill="#7C3AED"></polygon>
  <rect x="118" y="76" width="66" height="48" rx="12" fill="#A78BFA" opacity="0.92"></rect>
